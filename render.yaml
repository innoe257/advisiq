services:
  - type: web
    name: advisiq-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # No dockerCommand override needed — the Dockerfile's own CMD already
    # respects $PORT, which Render injects at runtime (see Dockerfile).
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: advisiq-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      # Placeholder — update to the real Vercel URL after the frontend is
      # deployed (step 2 in the README's deployment section). Must be a
      # JSON array since Settings.cors_origins is a list[str].
      - key: CORS_ORIGINS
        value: '["https://CHANGE-ME.vercel.app"]'
      # Optional: paste a Sentry DSN here later to enable error reporting.
      # Left unset, Sentry never initializes at all (see app/main.py).
      - key: SENTRY_DSN
        sync: false

databases:
  - name: advisiq-db
    plan: free
    databaseName: advisiq
    user: advisiq
