services:
  - type: web
    name: advisiq-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # No dockerCommand override: preDeployCommand isn't available on Render's
    # free tier, and passing an inline shell string through dockerCommand
    # turned out not to survive Render's config layer intact (the && got
    # swallowed). The image's own CMD (docker-entrypoint.sh) already runs
    # migrations then starts uvicorn, so the default is used as-is.
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: advisiq-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      # Must be a JSON array since Settings.cors_origins is a list[str].
      - key: CORS_ORIGINS
        value: '["https://advisiq.vercel.app"]'
      # Optional: paste a Sentry DSN here later to enable error reporting.
      # Left unset, Sentry never initializes at all (see app/main.py).
      - key: SENTRY_DSN
        sync: false

databases:
  - name: advisiq-db
    plan: free
    databaseName: advisiq
    user: advisiq
