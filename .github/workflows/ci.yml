name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: advisiq
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: advisiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U advisiq"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://advisiq:testpassword@localhost:5432/advisiq
      JWT_SECRET_KEY: ci-test-secret-not-for-production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # xgboost's compiled extension needs the OpenMP runtime — same reason
      # the Dockerfile installs it, and why a fresh macOS install needs
      # `brew install libomp`.
      - name: Install libgomp1
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy app

      - name: pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  build-images:
    name: Build and push Docker images
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/advisiq-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/advisiq-frontend:latest
